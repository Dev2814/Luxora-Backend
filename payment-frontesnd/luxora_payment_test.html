<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luxora Payment Test Dashboard</title>

<script src="https://js.stripe.com/v3/"></script>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#000;
    color:white;
    border:none;
    cursor:pointer;
}

#card-element{
    padding:10px;
    border:1px solid #ccc;
    margin-top:15px;
}

.status{
    margin-top:15px;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Luxora Payment Test</h2>

<label>Order ID</label>
<input id="order_id" type="number" placeholder="Enter Order ID">

<button onclick="createPayment()">Create Payment</button>

<div id="card-element"></div>

<button onclick="pay()">Pay Now</button>

<button onclick="checkStatus()">Check Payment Status</button>

<div id="result" class="status"></div>

</div>

<script>

const stripe = Stripe("pk_test_51SwMD8QThw5tADI6Z01ddaRCKANipM0rVVs6AYA1jdp6cpYzYtKnw7uqGi56tKFrSieg9a9TIf5dkdKwWgIgkHJd00ABpvi3I3");

const elements = stripe.elements();
const card = elements.create("card");

card.mount("#card-element");

let clientSecret = null;

async function createPayment(){

    const orderId = document.getElementById("order_id").value;

    const response = await fetch(
        "http://localhost:2814/api/v1/payments/create",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                order_id: parseInt(orderId)
            })
        }
    );

    const data = await response.json();

    clientSecret = data.client_secret;

    document.getElementById("result").innerHTML =
        "Payment Intent Created";

}

async function pay(){

    if(!clientSecret){
        alert("Create payment first!");
        return;
    }

    const result = await stripe.confirmCardPayment(
        clientSecret,
        {
            payment_method:{
                card:card
            }
        }
    );

    if(result.error){

        console.log(result.error);

        document.getElementById("result").innerHTML =
        "<span class='error'>Payment Failed: " + result.error.message + "</span>";

    } else {

        document.getElementById("result").innerHTML =
        "<span class='success'>Payment Successful</span>";

    }

}

async function checkStatus(){

    const orderId = document.getElementById("order_id").value;

    const response = await fetch(
        "http://localhost:2814/api/v1/payments/status/" + orderId
    );

    const data = await response.json();

    document.getElementById("result").innerHTML =
        "Payment Status: " + data.payment_status;

}

</script>

</body>
</html>
