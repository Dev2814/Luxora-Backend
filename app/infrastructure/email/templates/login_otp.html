{% extends "base.html" %}

<p>Hello,</p>

<p>
Use the following One-Time Password (OTP) to login to your
<strong>Luxora</strong> account.
</p>

<div style="
margin:30px auto;
padding:18px;
max-width:260px;
text-align:center;
font-size:32px;
letter-spacing:8px;
font-weight:bold;
background:#f4f6f8;
border-radius:8px;
border:1px solid #ddd;
